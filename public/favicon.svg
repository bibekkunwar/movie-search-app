<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#141414"/>

  <!-- Movie reel outer circle -->
  <circle cx="45" cy="48" r="40" fill="none" stroke="#E50914" stroke-width="5"/>

  <!-- Movie reel center hole -->
  <circle cx="45" cy="48" r="12" fill="#E50914"/>

  <!-- Movie reel spokes -->
  <line x1="45" y1="26" x2="45" y2="34" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="45" y1="62" x2="45" y2="70" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="23" y1="48" x2="31" y2="48" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>
  <line x1="59" y1="48" x2="67" y2="48" stroke="#E50914" stroke-width="3" stroke-linecap="round"/>

  <!-- Small reel holes -->
  <circle cx="45" cy="30" r="3" fill="#141414" stroke="#E50914" stroke-width="2"/>
  <circle cx="45" cy="66" r="3" fill="#141414" stroke="#E50914" stroke-width="2"/>
  <circle cx="29" cy="48" r="3" fill="#141414" stroke="#E50914" stroke-width="2"/>
  <circle cx="61" cy="48" r="3" fill="#141414" stroke="#E50914" stroke-width="2"/>

  <!-- Magnifying glass handle -->
  <line x1="65" y1="68" x2="76" y2="79" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Magnifying glass circle -->
  <circle cx="58" cy="62" r="14" fill="none" stroke="white" stroke-width="4"/>
</svg>
